<svg width="1200" height="1500" viewBox="0 0 1200 1500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#63ffb4" stroke-opacity="0.055" stroke-width="1"/>
    </pattern>
    <radialGradient id="orbA" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#63ffb4" stop-opacity="0.13"/>
      <stop offset="70%" stop-color="#63ffb4" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orbB" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7850ff" stop-opacity="0.10"/>
      <stop offset="75%" stop-color="#7850ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="lineGlow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#63ffb4" stop-opacity="0"/>
      <stop offset="50%" stop-color="#63ffb4"/>
      <stop offset="100%" stop-color="#63ffb4" stop-opacity="0"/>
    </linearGradient>
    <style>
      .mono { font-family: "Space Mono", "Consolas", monospace; }
      .syne { font-family: "Arial Black", "Arial", sans-serif; font-weight: 800; }
      .label { font-family: "Space Mono", "Consolas", monospace; font-size: 16px; letter-spacing: 8px; fill: #63ffb4; font-weight: 700; }
      .small { font-family: "Space Mono", "Consolas", monospace; font-size: 18px; fill: rgba(255,255,255,0.64); }
      .muted { fill: rgba(255,255,255,0.45); }
      .green { fill: #63ffb4; }
    </style>
  </defs>

  <rect width="1200" height="1500" fill="#0a0a0f"/>
  <rect width="1200" height="1500" fill="url(#grid)"/>
  <circle cx="1125" cy="70" r="260" fill="url(#orbA)"/>
  <circle cx="50" cy="1450" r="230" fill="url(#orbB)"/>

  <g transform="translate(120 70)">
